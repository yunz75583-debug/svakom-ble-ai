<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SL278K 双通道中继</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #e6edf3;
        }
        .container {
            background: #151b23;
            border-radius: 28px;
            padding: 24px 20px 28px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2d3643;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #f0883e, #e05a5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 13px;
            color: #7d8590;
            margin-bottom: 18px;
        }
        .status-bar {
            background: #1c2532;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d3643;
            font-size: 13px;
        }
        .dot {
            display: inline-block;
            width: 10px; height: 10px; border-radius: 50%;
            margin-right: 8px;
        }
        .dot.off { background: #5a6577; }
        .dot.on { background: #3fb950; box-shadow: 0 0 8px #3fb95066; }
        .dot.warn { background: #d29922; }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .input-group input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #2d3643;
            background: #0d1117;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
        }
        .input-group input::placeholder { color: #484f5a; }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #2d7aff; color: #fff; }
        .btn-primary:disabled { opacity: 0.4; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-success { background: #238636; color: #fff; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .slider-group { margin-top: 16px; }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .slider-label span:last-child { color: #f0883e; font-weight: 600; }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 4px;
            background: #21262d;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #2d7aff;
            cursor: pointer;
            box-shadow: 0 0 10px #2d7aff66;
        }
        .log {
            background: #0d1117;
            border-radius: 12px;
            padding: 12px 14px;
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #7d8590;
            line-height: 1.7;
            border: 1px solid #21262d;
            margin-top: 16px;
        }
        .log .ok { color: #3fb950; }
        .log .err { color: #da3633; }
        .log .warn { color: #d29922; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #3d4757;
            margin-top: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 SL278K 中继</h1>
    <div class="sub">震动 + 伸缩 · 双通道控制</div>

    <div class="status-bar">
        <span><span class="dot off" id="dotRelay"></span>中继</span>
        <span><span class="dot off" id="dotBle"></span>蓝牙</span>
        <span><span class="dot off" id="dotPoll"></span>轮询</span>
        <span><span class="dot off" id="dotAudio"></span>保活</span>
    </div>

    <div class="input-group">
        <input type="text" id="relayUrl" placeholder="https://xxx.up.railway.app">
        <input type="password" id="relaySecret" placeholder="密码" style="flex:0.6;">
    </div>
    <div class="row">
        <button class="btn btn-secondary" id="connectRelayBtn" style="flex:1;">🔗 连接中继</button>
        <button class="btn btn-secondary" id="connectBleBtn" style="flex:1;">🔵 连接蓝牙</button>
    </div>
    <div class="row" style="margin-top:6px;">
        <button class="btn btn-success" id="playAudioBtn" style="flex:1;">🔊 保活</button>
        <button class="btn btn-danger" id="stopAudioBtn" style="flex:1;">⏹ 停止保活</button>
    </div>

    <!-- 双通道控制 -->
    <div class="slider-group">
        <div class="slider-label">
            <span>⚡ 震动强度</span>
            <span id="vibDisplay">0%</span>
        </div>
        <input type="range" id="vibSlider" min="0" max="100" value="0">
    </div>
    <div class="slider-group">
        <div class="slider-label">
            <span>📏 伸缩强度</span>
            <span id="extDisplay">0%</span>
        </div>
        <input type="range" id="extSlider" min="0" max="100" value="0">
    </div>
    <div class="row">
        <button class="btn btn-danger" id="stopBtn" style="flex:1;">⏹ 停止</button>
        <button class="btn btn-secondary" id="testBtn" style="flex:1;">🔬 测试</button>
    </div>

    <div class="log" id="log">等待操作...</div>
    <div class="footer">中继 · 轮询 300ms · 续命 1500ms</div>
</div>

<script>
    // ============================================================
    // SVAKOM SL278K 中继 — 双通道控制（优化版）
    // ============================================================

    const SERVICE_UUID = "FFE0";
    const CHARACTERISTIC_UUID = "FFE1";
    const KEEPALIVE_MS = 1500;
    const POLL_MS = 300;

    let bleDevice = null, bleServer = null, bleChar = null;
    let isBleConnected = false;
    let isRelayConnected = false;
    let relayUrl = '', relaySecret = '';
    let vibVal = 0, extVal = 0;
    let lastVib = 0, lastExt = 0;
    let keepaliveTimer = null, pollTimer = null;
    let audioEl = null;
    let isTesting = false;  // 测试状态锁

    const logEl = document.getElementById('log');
    const dotRelay = document.getElementById('dotRelay');
    const dotBle = document.getElementById('dotBle');
    const dotPoll = document.getElementById('dotPoll');
    const dotAudio = document.getElementById('dotAudio');

    function log(msg, type = '') {
        const t = new Date().toLocaleTimeString();
        const cls = type ? ` class="${type}"` : '';
        logEl.innerHTML = `<span${cls}>[${t}] ${msg}</span>\n` + logEl.innerHTML;
        if (logEl.children.length > 80) logEl.removeChild(logEl.lastChild);
    }

    function setDot(el, state) {
        el.className = 'dot ' + state;
    }

    // ===== 指令构建 =====
    function buildCommands(vibPct, extPct) {
        const v = Math.min(7, Math.max(0, Math.round(vibPct / 100 * 7)));
        const e = Math.min(10, Math.max(0, Math.round(extPct / 100 * 10)));
        return {
            vib: new Uint8Array([0x55, 0x08, 0x00, 0x00, v, 0x00, 0x00]),
            ext: new Uint8Array([0x55, 0x03, 0x00, 0x00, e, 0x05, 0x00]),
            v, e
        };
    }

    // ===== 发送 =====
    async function sendBoth(vibPct, extPct) {
        if (!bleChar || !isBleConnected) {
            return false;
        }
        try {
            const cmds = buildCommands(vibPct, extPct);
            await bleChar.writeValue(cmds.vib);
            await bleChar.writeValue(cmds.ext);
            lastVib = vibPct;
            lastExt = extPct;
            log(`📤 震动 ${cmds.v} · 伸缩 ${cmds.e}`, 'ok');
            return true;
        } catch (e) {
            log(`❌ 发送失败: ${e.message}`, 'err');
            return false;
        }
    }

    // ===== 停止 =====
    async function stopBoth() {
        await sendBoth(0, 0);
        document.getElementById('vibSlider').value = 0;
        document.getElementById('extSlider').value = 0;
        document.getElementById('vibDisplay').textContent = '0%';
        document.getElementById('extDisplay').textContent = '0%';
        vibVal = 0; extVal = 0;
        log('⏹ 已停止', 'warn');
    }

    // ===== 续命 =====
    function startKeepalive() {
        stopKeepalive();
        if (isTesting) return;  // 测试期间不启动续命
        keepaliveTimer = setInterval(() => {
            if (bleChar && isBleConnected && (lastVib > 0 || lastExt > 0)) {
                const cmds = buildCommands(lastVib, lastExt);
                bleChar.writeValue(cmds.vib).catch(() => {});
                bleChar.writeValue(cmds.ext).catch(() => {});
            }
        }, KEEPALIVE_MS);
    }

    function stopKeepalive() {
        if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
    }

    // ===== 轮询 =====
    async function pollCloud() {
        if (!isRelayConnected || !relayUrl || !relaySecret) return;
        try {
            const url = `${relayUrl}/toy-next?secret=${relaySecret}`;
            const resp = await fetch(url);
            if (!resp.ok) {
                if (resp.status === 401) {
                    log('❌ 密码错误', 'err');
                    isRelayConnected = false;
                    setDot(dotRelay, 'off');
                }
                return;
            }
            const data = await resp.json();
            if (data.command) {
                const cmd = data.command;
                if (cmd.action === 'vibration') {
                    const v = Math.min(100, Math.max(0, cmd.value));
                    document.getElementById('vibSlider').value = v;
                    document.getElementById('vibDisplay').textContent = v + '%';
                    vibVal = v;
                    if (!isTesting) sendBoth(v, extVal);
                } else if (cmd.action === 'extension') {
                    const e = Math.min(100, Math.max(0, cmd.value));
                    document.getElementById('extSlider').value = e;
                    document.getElementById('extDisplay').textContent = e + '%';
                    extVal = e;
                    if (!isTesting) sendBoth(vibVal, e);
                } else if (cmd.action === 'stop') {
                    stopBoth();
                }
            }
        } catch (e) {
            // 静默
        }
    }

    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollCloud, POLL_MS);
        setDot(dotPoll, 'on');
        log('🔄 轮询启动 (300ms)', 'ok');
    }

    function stopPolling() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; setDot(dotPoll, 'off'); }
    }

    // ===== 连接中继 =====
    async function connectRelay() {
        const url = document.getElementById('relayUrl').value.trim();
        const secret = document.getElementById('relaySecret').value.trim();
        if (!url) { log('❌ 请输入地址', 'err'); return; }
        if (!secret) { log('❌ 请输入密码', 'err'); return; }
        relayUrl = url.startsWith('http') ? url : 'https://' + url;
        relaySecret = secret;
        try {
            const resp = await fetch(`${relayUrl}/status`);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            isRelayConnected = true;
            setDot(dotRelay, 'on');
            log('✅ 中继已连接', 'ok');
            startPolling();
        } catch (e) {
            log(`❌ 连接失败: ${e.message}`, 'err');
        }
    }

    // ===== 连接蓝牙 =====
    async function connectBle() {
        if (!navigator.bluetooth) {
            log('❌ 请使用 Bluefy', 'err');
            alert('请使用 Bluefy 浏览器打开');
            return;
        }
        try {
            setDot(dotBle, 'warn');
            log('🔍 扫描 SL278K...', '');
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });
            log(`✅ 找到: ${bleDevice.name || '未知'}`, 'ok');
            bleServer = await bleDevice.gatt.connect();
            const svc = await bleServer.getPrimaryService(SERVICE_UUID);
            bleChar = await svc.getCharacteristic(CHARACTERISTIC_UUID);
            isBleConnected = true;
            setDot(dotBle, 'on');
            log('✅ 蓝牙已连接', 'ok');
            bleDevice.addEventListener('gattserverdisconnected', () => {
                isBleConnected = false;
                setDot(dotBle, 'off');
                log('⚠️ 蓝牙断开', 'err');
            });
            startKeepalive();
            await stopBoth();
        } catch (e) {
            log(`❌ 蓝牙失败: ${e.message}`, 'err');
            setDot(dotBle, 'off');
        }
    }

    // ===== 音频保活 =====
    function playAudio() {
        try {
            if (!audioEl) {
                audioEl = document.createElement('audio');
                audioEl.loop = true;
                audioEl.volume = 0.01;
                audioEl.style.display = 'none';
                audioEl.src = 'https://img.heliar.top/file/1772516513350_30min-osbvow_2.mp4';
                document.body.appendChild(audioEl);
            }
            audioEl.play().then(() => {
                setDot(dotAudio, 'on');
                log('🔊 保活音频已启动', 'ok');
            }).catch(() => {
                log('⚠️ 音频播放需用户交互', 'warn');
            });
        } catch (e) {
            log(`⚠️ 音频启动失败: ${e.message}`, 'warn');
        }
    }

    function stopAudio() {
        if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
        setDot(dotAudio, 'off');
        log('🔇 保活已停止', 'warn');
    }

    // ===== UI 事件绑定 =====
    document.getElementById('connectRelayBtn').addEventListener('click', connectRelay);
    document.getElementById('connectBleBtn').addEventListener('click', connectBle);
    document.getElementById('playAudioBtn').addEventListener('click', playAudio);
    document.getElementById('stopAudioBtn').addEventListener('click', stopAudio);

    const vibSlider = document.getElementById('vibSlider');
    const extSlider = document.getElementById('extSlider');
    const vibDisplay = document.getElementById('vibDisplay');
    const extDisplay = document.getElementById('extDisplay');

    // 滑块即拖即发
    vibSlider.addEventListener('input', () => {
        const val = parseInt(vibSlider.value);
        vibDisplay.textContent = val + '%';
        vibVal = val;
        if (!isTesting) sendBoth(vibVal, parseInt(extSlider.value));
    });

    extSlider.addEventListener('input', () => {
        const val = parseInt(extSlider.value);
        extDisplay.textContent = val + '%';
        extVal = val;
        if (!isTesting) sendBoth(parseInt(vibSlider.value), extVal);
    });

    document.getElementById('stopBtn').addEventListener('click', stopBoth);

    // 测试：暂停续命，状态锁
    document.getElementById('testBtn').addEventListener('click', async () => {
        if (isTesting) return;
        isTesting = true;
        stopKeepalive();
        log('🔬 测试: 震动 50% + 伸缩 30%', 'warn');

        await sendBoth(50, 30);

        setTimeout(async () => {
            await stopBoth();
            isTesting = false;
            startKeepalive();
            log('✅ 测试完成，续命已恢复', 'ok');
        }, 2000);
    });

    // ===== 保存配置 =====
    const savedUrl = localStorage.getItem('relayUrl');
    const savedSecret = localStorage.getItem('relaySecret');
    if (savedUrl) document.getElementById('relayUrl').value = savedUrl;
    if (savedSecret) document.getElementById('relaySecret').value = savedSecret;

    document.getElementById('relayUrl').addEventListener('change', e => localStorage.setItem('relayUrl', e.target.value));
    document.getElementById('relaySecret').addEventListener('change', e => localStorage.setItem('relaySecret', e.target.value));

    log('📡 SL278K 中继已加载', '');
    log('💡 连接中继 → 连接蓝牙 → 拖动滑块控制', '');
</script>
</body>
</html>
